name: Publish NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.2.3)'
        required: true
        type: string
      publish_nuget:
        description: 'Publish to NuGet.org'
        required: true
        default: true
        type: boolean
      publish_github:
        description: 'Publish to GitHub Packages'
        required: true
        default: true
        type: boolean

permissions:
  contents: read

run-name: NuGet release ${{ inputs.version }} #${{ github.run_number }}

jobs:
  # ── Pack ────────────────────────────────────────────────────────────────────
  pack:
    name: Pack NuGet package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Pack
        run: |
          dotnet pack -c Release \
            -p:PackageVersion=${{ inputs.version }} \
            -p:ContinuousIntegrationBuild=true \
            -o artifacts/nuget-packages

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget-packages/*.nupkg
          if-no-files-found: error
          retention-days: 14

  # ── Publish to NuGet.org ────────────────────────────────────────────────────
  publish-nuget:
    name: Publish to NuGet.org
    runs-on: ubuntu-latest
    needs: pack
    if: ${{ inputs.publish_nuget }}

    steps:
      - name: Download packages artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget-packages

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Validate NUGET_API_KEY
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "ERROR: NUGET_API_KEY secret is not set."
            exit 1
          fi

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push artifacts/nuget-packages/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  # ── Publish to GitHub Packages ───────────────────────────────────────────────
  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: pack
    if: ${{ inputs.publish_github }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download packages artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget-packages

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Configure GitHub Packages source
        run: |
          dotnet nuget add source \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name github-packages \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push artifacts/nuget-packages/*.nupkg \
            --source github-packages \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate
