name: Publish NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.2.3)'
        required: true
        type: string
      publish_nuget:
        description: 'Publish to NuGet.org'
        required: true
        default: true
        type: boolean
      publish_github:
        description: 'Publish to GitHub Packages'
        required: true
        default: true
        type: boolean

permissions:
  contents: read

run-name: NuGet release ${{ inputs.version }} #${{ github.run_number }}

jobs:
  # ── Pack ────────────────────────────────────────────────────────────────────
  pack:
    name: Pack NuGet package
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            global.json
            MauiRust.Templates.csproj

      - name: Pack
        shell: pwsh
        run: |
          dotnet pack MauiRust.Templates.csproj `
            --configuration Release `
            --nologo `
            -p:PackageVersion=${{ inputs.version }} `
            -p:ContinuousIntegrationBuild=true
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Collect packages
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts/nuget-packages'
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          $packageFiles = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -File |
            Where-Object {
              $_.FullName -match '[\\/]bin[\\/]Release[\\/]' -and
              ($_.Extension -eq '.nupkg' -or $_.Extension -eq '.snupkg')
            }

          if (-not $packageFiles) {
            throw 'No NuGet packages were produced by dotnet pack.'
          }

          foreach ($f in $packageFiles) {
            Copy-Item $f.FullName -Destination $artifactDir -Force
          }

          Write-Host 'Collected packages:'
          Get-ChildItem $artifactDir | Sort-Object Name | ForEach-Object {
            Write-Host " - $($_.Name)"
          }

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget-packages/*
          if-no-files-found: error
          retention-days: 14

  # ── Publish to NuGet.org ────────────────────────────────────────────────────
  publish-nuget:
    name: Publish to NuGet.org
    runs-on: windows-latest
    needs: pack
    if: ${{ inputs.publish_nuget }}

    steps:
      - name: Download packages artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget-packages

      - name: Setup NuGet CLI
        uses: NuGet/setup-nuget@v2

      - name: Push packages to NuGet.org
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw 'Missing required repository secret: NUGET_API_KEY'
          }

          $packages = Get-ChildItem -Path 'artifacts/nuget-packages' -File |
            Where-Object { $_.Extension -eq '.nupkg' }

          if (-not $packages) {
            throw 'No .nupkg files found to publish to NuGet.org.'
          }

          foreach ($package in $packages) {
            Write-Host "Publishing $($package.Name) to NuGet.org"
            nuget push $package.FullName -Source https://api.nuget.org/v3/index.json -ApiKey $env:NUGET_API_KEY -SkipDuplicate -NonInteractive
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

  # ── Publish to GitHub Packages ───────────────────────────────────────────────
  publish-github:
    name: Publish to GitHub Packages
    runs-on: windows-latest
    needs: pack
    if: ${{ inputs.publish_github }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download packages artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget-packages

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Configure GitHub Packages source
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
            throw 'Missing GitHub Packages auth via GITHUB_TOKEN.'
          }

          $sourceName = 'github-actions'
          $sourceUrl = 'https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json'

          dotnet nuget remove source $sourceName 2>$null
          dotnet nuget add source $sourceUrl --name $sourceName --username '${{ github.actor }}' --password $env:GITHUB_TOKEN --store-password-in-clear-text
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Push packages to GitHub Packages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
            throw 'Missing GitHub Packages auth via GITHUB_TOKEN.'
          }

          $packages = Get-ChildItem -Path 'artifacts/nuget-packages' -File |
            Where-Object { $_.Extension -eq '.nupkg' }

          if (-not $packages) {
            throw 'No .nupkg files found to publish to GitHub Packages.'
          }

          foreach ($package in $packages) {
            Write-Host "Publishing $($package.Name) to GitHub Packages"
            dotnet nuget push $package.FullName --source github-actions --api-key $env:GITHUB_TOKEN --skip-duplicate --force-english-output
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
