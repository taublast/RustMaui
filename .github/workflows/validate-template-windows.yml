name: Validate Template on Windows

on:
  workflow_dispatch:

jobs:
  validate-template-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install MAUI workloads
        run: dotnet workload install maui-windows android

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Pack generator package
        shell: bash
        run: dotnet pack src/RustMaui.Generators/RustMaui.Generators.csproj -c Release -o nupkg

      - name: Pack template package
        shell: bash
        run: dotnet pack src/RustMaui.Templates/RustMaui.Templates.csproj -c Release -o nupkg -p:PackageVersion=0.0.0-ci

      - name: Add local package source
        shell: pwsh
        run: |
          dotnet nuget remove source rustmaui-local 2>$null
          dotnet nuget add source (Resolve-Path 'nupkg') --name rustmaui-local
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Install template
        shell: bash
        run: dotnet new install nupkg/RustMaui.Templates.0.0.0-ci.nupkg

      - name: Create test project
        shell: bash
        run: dotnet new rustmaui -n TestApp -o "$RUNNER_TEMP/test-app"

      - name: Build Windows
        shell: bash
        run: dotnet build "$RUNNER_TEMP/test-app/src/TestApp/TestApp.csproj" -f net10.0-windows10.0.19041.0 -p:ManagePackageVersionsCentrally=false

      - name: Verify generated bindings
        shell: bash
        run: |
          grep -F 'private const string Lib = ' "$RUNNER_TEMP/test-app/src/TestApp/Rust.Generated.cs"
          grep -F 'public static partial int Add(int a, int b);' "$RUNNER_TEMP/test-app/src/TestApp/Rust.Generated.cs"