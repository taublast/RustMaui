name: Test Android

on:
  workflow_dispatch:

jobs:
  test-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Install Rust stable with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache cargo registry and cargo-ndk binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-ndk
          key: cargo-ndk-${{ runner.os }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: cargo-ndk-${{ runner.os }}-

      - name: Install cargo-ndk
        run: command -v cargo-ndk >/dev/null 2>&1 || cargo install cargo-ndk --locked

      - name: Install Android NDK 27
        run: |
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Pack template
        run: dotnet pack -c Release -o nupkg -p:PackageVersion=0.0.0-ci

      - name: Install template
        run: dotnet new install nupkg/Community.MauiRust.Templates.0.0.0-ci.nupkg

      - name: Create test project
        run: dotnet new maui-rust -n TestApp -o test-app

      - name: Build Android
        run: dotnet build test-app/app/TestApp/TestApp.csproj -f net10.0-android
