name: Test iOS

on:
  workflow_dispatch:

jobs:
  test-ios:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install MAUI workloads
        # all four platform workloads needed: csproj lists net10.0-android,
        # net10.0-maccatalyst, net10.0-ios, net10.0-windows in TargetFrameworks
        # and MSBuild validates every TFM at project load even with -f net10.0-ios
        run: dotnet workload install maui-ios maccatalyst android

      - name: Install Rust stable with iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Pack template
        run: dotnet pack -c Release -o nupkg -p:PackageVersion=0.0.0-ci

      - name: Install template
        run: dotnet new install nupkg/Community.MauiRust.Templates.0.0.0-ci.nupkg

      - name: Create test project
        run: dotnet new maui-rust -n TestApp -o test-app

      - name: Build iOS simulator
        run: dotnet build test-app/app/TestApp/TestApp.csproj -f net10.0-ios -p:RuntimeIdentifier=iossimulator-arm64
