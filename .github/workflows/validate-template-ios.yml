name: Validate Template on iOS

on:
  workflow_dispatch:

jobs:
  validate-template-ios:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install MAUI workloads
        run: dotnet workload install maui-ios maccatalyst android

      - name: Install Rust stable with iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Pack generator package
        run: dotnet pack src/Community.MauiRust.Generators/Community.MauiRust.Generators.csproj -c Release -o nupkg

      - name: Pack template package
        run: dotnet pack src/Community.MauiRust.Templates/Community.MauiRust.Templates.csproj -c Release -o nupkg -p:PackageVersion=0.0.0-ci

      - name: Add local package source
        shell: pwsh
        run: |
          dotnet nuget remove source community-mauirust-local 2>$null
          dotnet nuget add source (Resolve-Path 'nupkg') --name community-mauirust-local
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Install template
        run: dotnet new install nupkg/Community.MauiRust.Templates.0.0.0-ci.nupkg

      - name: Create test project
        run: dotnet new maui-rust -n TestApp -o "$RUNNER_TEMP/test-app"

      - name: Build iOS simulator
        run: dotnet build "$RUNNER_TEMP/test-app/src/TestApp/TestApp.csproj" -f net10.0-ios -p:RuntimeIdentifier=iossimulator-arm64 -p:ManagePackageVersionsCentrally=false

      - name: Verify generated bindings
        run: |
          grep -F 'private const string Lib = ' "$RUNNER_TEMP/test-app/src/TestApp/Rust.Generated.cs"
          grep -F 'public static partial int Add(int a, int b);' "$RUNNER_TEMP/test-app/src/TestApp/Rust.Generated.cs"